services:
  postgres:
    image: postgres:16-alpine
    container_name: bbooks_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bbooks
      POSTGRES_PASSWORD: bbooks_password
      POSTGRES_DB: bbooks
    ports:
      - "5432:5432"
    volumes:
      - bbooks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbooks -d bbooks"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bbooks_postgres_data:
